version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-job_matching}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - graphhire-net

  redis:
    image: redis:7-alpine
    container_name: redis
    env_file: ../.env
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_dev:/data
    networks:
      - graphhire-net

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: qdrant
    env_file: ../.env
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    networks:
      - graphhire-net

volumes:
  postgres_data_dev:
  redis_data_dev:
  qdrant_data_dev:

networks:
  graphhire-net:
    driver: bridge
