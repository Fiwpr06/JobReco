services:
  api:
    image: job_matching_backend-api:latest
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/job_matching
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=$SECRET_KEY
      - HF_HOME=/tmp/hf_cache
      - HF_HUB_OFFLINE=1
    depends_on: [db, redis]
    volumes:
      - .:/app
      - C:\Users\fiwpr\.cache\huggingface:/tmp/hf_cache
    command: sh -c "pip install bcrypt==4.1.3 && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  celery_worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on: [db, redis, qdrant]
    volumes:
      - .:/app
      - C:\Users\fiwpr\.cache\huggingface:/tmp/hf_cache
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/job_matching
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=$SECRET_KEY
      - HF_HOME=/tmp/hf_cache
      - HF_HUB_OFFLINE=1

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: job_matching
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
