# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to prepend to the "slug" of a
# new revision.  if omitted, defaults to 40.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# prepend_sys_path = false

# version path separator; as of alembic 1.3.0, path separator
# can be ',' or ' ' or ';'.
# version_path_separator = :

# set to 'true' to enable output of SQL statements as they are executed
# show_stderr = false

# set to 'true' to enable SQL statement logging in a single-file config
# log_file =

sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/job_matching

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
