name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r apps/api/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 apps/api --count --select=E9,F63,F7,F82 --show-source --statistics

      # Assuming tests are in tests/
      # - name: Run tests
      #   run: pytest

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prune API Microservice Dependency Graph
        run: npx turbo prune @graphhire/api --docker

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: out/full/apps/api
          file: out/full/apps/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/job-matching-backend:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubernetes credentials
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k infrastructure/k8s/
          kubectl rollout restart deployment fastapi -n graphhire
          kubectl rollout restart deployment celery-worker -n graphhire
